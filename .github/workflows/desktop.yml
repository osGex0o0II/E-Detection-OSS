name: desktop

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to publish, for example v0.2.0. Leave empty to only build."
        required: false
        type: string
      run_desktop_ui_smoke:
        description: "Run interactive desktop UI smoke tests. Use only on a runner with an interactive desktop."
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - "desktop/**"
      - "desktop/scripts/**"
      - "NuGet.Config"
      - "global.json"
      - ".github/workflows/desktop.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "desktop/**"
      - "desktop/scripts/**"
      - "NuGet.Config"
      - "global.json"
      - ".github/workflows/desktop.yml"

permissions:
  contents: read

jobs:
  winui-build:
    name: build WinUI shell
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}

      - name: Validate release ref before repository scripts
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
        shell: pwsh
        env:
          RELEASE_TAG_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq "tag") {
              $env:GITHUB_REF_NAME
          }
          else {
              $env:RELEASE_TAG_INPUT
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
              throw "Release tag is required for release builds."
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$') {
              throw "Release tag '$tag' must look like v1.2.3."
          }

          git fetch --tags --force
          $tagSha = (& git rev-list -n 1 $tag 2>$null).Trim()
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($tagSha)) {
              throw "Release tag $tag does not exist. Create and push the tag first, then rerun the workflow."
          }

          $global:LASTEXITCODE = 0
          $buildSha = (& git rev-parse HEAD).Trim()
          if ($tagSha -ne $buildSha) {
              throw "release_tag $tag points to $tagSha, but this workflow checked out $buildSha."
          }

          git fetch origin main --force
          & git merge-base --is-ancestor $tagSha origin/main
          if ($LASTEXITCODE -ne 0) {
              throw "Release tag $tag points to $tagSha, which is not contained in origin/main."
          }

      - name: Package health fixture
        shell: pwsh
        run: ./desktop/scripts/Test-DesktopPackageHealthFixture.ps1

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore desktop/EDetection.Desktop.slnx

      - name: Build
        run: dotnet build desktop/EDetection.Desktop.slnx -c Debug --no-restore

      - name: Native backend console smoke
        shell: pwsh
        run: ./desktop/scripts/Test-DesktopNativeBackendSmoke.ps1 -NoBuild

      - name: Settings migration and optional network smoke
        shell: pwsh
        run: ./desktop/scripts/Test-DesktopSettingsMigrationSmoke.ps1

      - name: Delivery script safety smoke
        shell: pwsh
        run: ./desktop/scripts/Test-DesktopScriptSafetySmoke.ps1

      - name: Diagnostics redaction smoke
        shell: pwsh
        run: ./desktop/scripts/Test-DesktopDiagnosticsRedactionSmoke.ps1

      - name: Release posture smoke
        shell: pwsh
        run: ./desktop/scripts/Test-DesktopReleasePosture.ps1

      - name: Publish
        shell: pwsh
        run: ./desktop/scripts/Publish-Desktop.ps1 -RuntimeIdentifier win-x64

      - name: Determine release signing mode
        if: ${{ (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')) && github.event_name != 'pull_request' }}
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_BASE64 }}
          WINDOWS_CODE_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_PASSWORD }}
          RELEASE_TAG_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        run: |
          $tag = if ($env:GITHUB_REF_TYPE -eq "tag") {
              $env:GITHUB_REF_NAME
          }
          else {
              $env:RELEASE_TAG_INPUT
          }
          $forceUnsigned = $tag -eq "v2.0.2"
          $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_PFX_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_PFX_PASSWORD)
          if (!$forceUnsigned -and ($hasCertificate -xor $hasPassword)) {
              throw "Code-signing configuration is incomplete. Configure both WINDOWS_CODE_SIGNING_PFX_BASE64 and WINDOWS_CODE_SIGNING_PFX_PASSWORD, or configure neither to publish an unsigned release."
          }

          $signReleaseArtifacts = if (!$forceUnsigned -and $hasCertificate) { "true" } else { "false" }
          "SIGN_RELEASE_ARTIFACTS=$signReleaseArtifacts" | Add-Content -Path $env:GITHUB_ENV
          if ($forceUnsigned) {
              "## Unsigned v2.0.2 release`n`nThe v2.0.2 release assets are intentionally unsigned. SHA-256 verifies file integrity, not publisher identity. Windows may show an Unknown Publisher or SmartScreen warning." | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }
          elseif ($hasCertificate) {
              "## Release signing`n`nAuthenticode signing is enabled for this release." | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }
          else {
              "## Unsigned release`n`nNo code-signing certificate is configured. The release assets are intentionally unsigned; Windows may show an Unknown Publisher or SmartScreen warning." | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          }

      - name: Sign published app for release
        if: ${{ env.SIGN_RELEASE_ARTIFACTS == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_BASE64 }}
          WINDOWS_CODE_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_PASSWORD }}
          WINDOWS_CODE_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODE_SIGNING_TIMESTAMP_URL }}
        run: ./desktop/scripts/Sign-DesktopArtifacts.ps1 -Path ./artifacts/desktop/win-x64/publish/EDetection.exe

      - name: Inspect published app signature
        shell: pwsh
        run: |
          if ("${{ env.SIGN_RELEASE_ARTIFACTS }}" -eq "true") {
              ./desktop/scripts/Test-DesktopSignatureStatus.ps1 -Path ./artifacts/desktop/win-x64/publish/EDetection.exe -RequireSigned
          }
          else {
              ./desktop/scripts/Test-DesktopSignatureStatus.ps1 -Path ./artifacts/desktop/win-x64/publish/EDetection.exe
          }

      - name: Package health
        shell: pwsh
        run: ./artifacts/desktop/win-x64/publish/Test-DesktopPackageHealth.ps1 -PackagePath ./artifacts/desktop/win-x64/publish

      - name: Startup visibility smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_desktop_ui_smoke == true }}
        shell: pwsh
        run: ./artifacts/desktop/win-x64/publish/Test-DesktopSingleInstanceSmoke.ps1 -PackagePath ./artifacts/desktop/win-x64/publish -OutputDirectory ./artifacts/desktop/single-instance-smoke

      - name: Settings page smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_desktop_ui_smoke == true }}
        shell: pwsh
        run: ./artifacts/desktop/win-x64/publish/Test-DesktopSettingsSmoke.ps1 -PackagePath ./artifacts/desktop/win-x64/publish -OutputDirectory ./artifacts/desktop/settings-smoke

      - name: Visual smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_desktop_ui_smoke == true }}
        shell: pwsh
        run: ./artifacts/desktop/win-x64/publish/Test-DesktopVisualSmoke.ps1 -PackagePath ./artifacts/desktop/win-x64/publish -OutputDirectory ./artifacts/desktop/visual-smoke

      - name: Package health after UI smoke
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_desktop_ui_smoke == true }}
        shell: pwsh
        run: ./artifacts/desktop/win-x64/publish/Test-DesktopPackageHealth.ps1 -PackagePath ./artifacts/desktop/win-x64/publish

      - name: Install smoke
        shell: pwsh
        run: ./artifacts/desktop/win-x64/publish/Test-DesktopInstallSmoke.ps1 -PackagePath ./artifacts/desktop/win-x64/publish

      - name: Installer static smoke
        shell: pwsh
        run: ./desktop/scripts/Test-DesktopInstallerStatic.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build setup installer
        shell: pwsh
        run: ./desktop/scripts/Build-DesktopInstaller.ps1 -RuntimeIdentifier win-x64 -UnsafeInstallRootOverride "$env:TEMP\E-Detection-Desktop-InstallerSmoke\UnsafeRoot"

      - name: Sign setup installer for release
        if: ${{ env.SIGN_RELEASE_ARTIFACTS == 'true' }}
        shell: pwsh
        env:
          WINDOWS_CODE_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_BASE64 }}
          WINDOWS_CODE_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_PASSWORD }}
          WINDOWS_CODE_SIGNING_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODE_SIGNING_TIMESTAMP_URL }}
        run: ./desktop/scripts/Sign-DesktopArtifacts.ps1 -Path ./artifacts/desktop/win-x64/installer/EDetection-Setup-win-x64.exe

      - name: Inspect setup installer signature
        shell: pwsh
        run: |
          if ("${{ env.SIGN_RELEASE_ARTIFACTS }}" -eq "true") {
              ./desktop/scripts/Test-DesktopSignatureStatus.ps1 -Path ./artifacts/desktop/win-x64/installer/EDetection-Setup-win-x64.exe -RequireSigned
          }
          else {
              ./desktop/scripts/Test-DesktopSignatureStatus.ps1 -Path ./artifacts/desktop/win-x64/installer/EDetection-Setup-win-x64.exe
          }

      - name: Installer smoke
        shell: pwsh
        run: ./desktop/scripts/Test-DesktopInstallerSmoke.ps1 -InstallerPath ./artifacts/desktop/win-x64/installer/EDetection-Setup-win-x64.exe -UnsafeInstallDirectory "$env:TEMP\E-Detection-Desktop-InstallerSmoke\UnsafeRoot"

      - name: Refresh portable zip after signing
        shell: pwsh
        run: |
          $zipPath = "./artifacts/desktop/win-x64/EDetection-win-x64.zip"
          if (Test-Path $zipPath) {
              Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path "./artifacts/desktop/win-x64/publish/*" -DestinationPath $zipPath

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v6
        with:
          name: EDetection-win-x64
          path: |
            artifacts/desktop/win-x64/EDetection-win-x64.zip
            artifacts/desktop/win-x64/installer/EDetection-Setup-win-x64.exe
          if-no-files-found: error

      - name: Explain build-only run
        if: ${{ !(startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')) }}
        shell: pwsh
        run: |
          @(
              '## Desktop build completed'
              ''
              'This run uploaded workflow artifacts but did not publish a GitHub Release.'
              ''
              'Release publishing only runs for:'
              '- pushed tags matching `v*`'
              '- manual workflow runs with `release_tag` set'
          ) | Add-Content -Path $env:GITHUB_STEP_SUMMARY

  release:
    name: publish GitHub release
    runs-on: windows-latest
    needs: winui-build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    permissions:
      contents: write
    env:
      WINDOWS_CODE_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_BASE64 }}
      WINDOWS_CODE_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag || github.ref }}

      - name: Download desktop artifact
        uses: actions/download-artifact@v6
        with:
          name: EDetection-win-x64
          path: release-artifacts

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = if ($env:GITHUB_REF_TYPE -eq "tag") {
              $env:GITHUB_REF_NAME
          }
          else {
              $env:RELEASE_TAG_INPUT
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
              throw "Release tag is required for publishing a GitHub Release."
          }
          $forceUnsigned = $tag -eq "v2.0.2"

          if ($tag -notmatch '^v\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$') {
              throw "Release tag '$tag' must look like v1.2.3."
          }

          git fetch --tags --force
          $tagSha = (& git rev-list -n 1 $tag 2>$null).Trim()
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($tagSha)) {
              throw "Release tag $tag does not exist. Create and push the tag first, then rerun the workflow."
          }

          $global:LASTEXITCODE = 0
          $buildSha = (& git rev-parse HEAD).Trim()
          if ($tagSha -ne $buildSha) {
              throw "release_tag $tag points to $tagSha, but this workflow checked out $buildSha."
          }

          git fetch origin main --force
          & git merge-base --is-ancestor $tagSha origin/main
          if ($LASTEXITCODE -ne 0) {
              throw "Release tag $tag points to $tagSha, which is not contained in origin/main."
          }

          [xml]$desktopProject = Get-Content -Path "desktop/EDetection.Desktop/EDetection.Desktop.csproj"
          $desktopVersion = ($desktopProject.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          $assemblyVersion = ($desktopProject.Project.PropertyGroup.AssemblyVersion | Select-Object -First 1).Trim()
          $fileVersion = ($desktopProject.Project.PropertyGroup.FileVersion | Select-Object -First 1).Trim()
          $tagVersion = $tag.TrimStart("v")
          if ($desktopVersion -ne $tagVersion) {
              throw "Release version mismatch. tag=$tagVersion desktop=$desktopVersion."
          }

          if ($tagVersion -notmatch '^(?<numericVersion>\d+\.\d+\.\d+)(?:[-+].+)?$') {
              throw "Release tag '$tag' does not contain a valid numeric version prefix."
          }
          $numericVersion = $Matches['numericVersion']
          if ($assemblyVersion -ne "$numericVersion.0" -or $fileVersion -ne "$numericVersion.0") {
              throw "Desktop assembly/file versions must match $numericVersion.0. AssemblyVersion=$assemblyVersion FileVersion=$fileVersion."
          }

          $zipPath = Get-ChildItem -Path release-artifacts -Recurse -File -Filter "EDetection-win-x64.zip" | Select-Object -First 1
          $setupPath = Get-ChildItem -Path release-artifacts -Recurse -File -Filter "EDetection-Setup-win-x64.exe" | Select-Object -First 1
          if ($null -eq $zipPath) {
              throw "Release asset was not found: EDetection-win-x64.zip"
          }

          if ($null -eq $setupPath) {
              throw "Release asset was not found: EDetection-Setup-win-x64.exe"
          }

          $portableVerifyPath = Join-Path $env:RUNNER_TEMP "E-Detection-PortableSignatureVerify"
          if (Test-Path -LiteralPath $portableVerifyPath) {
              Remove-Item -LiteralPath $portableVerifyPath -Recurse -Force
          }
          New-Item -ItemType Directory -Path $portableVerifyPath | Out-Null
          Expand-Archive -LiteralPath $zipPath.FullName -DestinationPath $portableVerifyPath -Force
          $portableAppPath = Get-ChildItem -Path $portableVerifyPath -Recurse -File -Filter "EDetection.exe" | Select-Object -First 1
          if ($null -eq $portableAppPath) {
              throw "Portable release asset does not contain EDetection.exe."
          }

          $portablePackageRoot = $portableAppPath.Directory.FullName
          $portableReleaseInfoPath = Join-Path $portablePackageRoot "release-info.txt"
          if (!(Test-Path -LiteralPath $portableReleaseInfoPath)) {
              throw "Portable release asset does not contain release-info.txt."
          }

          $portableReleaseInfo = @{}
          foreach ($line in Get-Content -LiteralPath $portableReleaseInfoPath) {
              $separatorIndex = $line.IndexOf('=')
              if ($separatorIndex -gt 0) {
                  $portableReleaseInfo[$line.Substring(0, $separatorIndex)] = $line.Substring($separatorIndex + 1)
              }
          }

          $portableBackend = [string]$portableReleaseInfo["DetectionBackend"]
          if ($portableBackend -ne "native") {
              throw "Production release asset must use the native backend. Actual=$portableBackend"
          }

          $portableHealthScript = Join-Path $portablePackageRoot "Test-DesktopPackageHealth.ps1"
          if (!(Test-Path -LiteralPath $portableHealthScript)) {
              throw "Portable release asset does not contain Test-DesktopPackageHealth.ps1."
          }

          & $portableHealthScript -PackagePath $portablePackageRoot
          if ($LASTEXITCODE -ne 0) {
              throw "Portable release package health failed after artifact download."
          }

          $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_PFX_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODE_SIGNING_PFX_PASSWORD)
          if ($forceUnsigned) {
              $hasCertificate = $false
              $hasPassword = $false
          }
          elseif ($hasCertificate -xor $hasPassword) {
              throw "Code-signing configuration is incomplete. Configure both signing secrets, or neither for an unsigned release."
          }
          $releaseSignaturePaths = @($setupPath.FullName, $portableAppPath.FullName)
          if ($hasCertificate) {
              ./desktop/scripts/Test-DesktopSignatureStatus.ps1 -Path $releaseSignaturePaths -RequireSigned
          }
          else {
              ./desktop/scripts/Test-DesktopSignatureStatus.ps1 -Path $releaseSignaturePaths
          }

          $shaPath = Join-Path $env:RUNNER_TEMP "EDetection-win-x64.sha256.txt"
          @(
              "$(Get-FileHash -Algorithm SHA256 -LiteralPath $setupPath.FullName | Select-Object -ExpandProperty Hash)  $($setupPath.Name)"
              "$(Get-FileHash -Algorithm SHA256 -LiteralPath $zipPath.FullName | Select-Object -ExpandProperty Hash)  $($zipPath.Name)"
          ) | Set-Content -Path $shaPath -Encoding ASCII

          $setupSignature = Get-AuthenticodeSignature -LiteralPath $setupPath.FullName
          $signatureStatus = $setupSignature.Status.ToString()
          if ($hasCertificate -and $signatureStatus -ne "Valid") {
              throw "Release setup installer must be Authenticode signed. Status=$signatureStatus."
          }
          if (!$hasCertificate -and $signatureStatus -ne "NotSigned") {
              throw "Unsigned release setup installer must not carry an unexpected signature state. Status=$signatureStatus."
          }
          $signatureLine = if ($forceUnsigned) {
              "The v2.0.2 setup installer and portable app are intentionally unsigned. Windows may show an Unknown Publisher or SmartScreen warning."
          }
          elseif ($hasCertificate) {
              "The setup installer is Authenticode signed by $($setupSignature.SignerCertificate.Subject)."
          }
          else {
              "The setup installer is intentionally unsigned because no code-signing certificate is configured. Windows may show an Unknown Publisher or SmartScreen warning."
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "desktop-release-notes.md"
          @(
              "Windows x64 desktop build generated from commit $buildSha."
              ""
              "Recommended for most users: download and run EDetection-Setup-win-x64.exe."
              "Use the same setup wizard to install or update the desktop app. It supports choosing the install location and normal Windows uninstall."
              $signatureLine
              "Portable package for advanced users: EDetection-win-x64.zip"
              ""
              "Included checks:"
              "- dotnet restore/build"
              "- publish package health"
              "- native backend console smoke"
              "- startup visibility smoke when run_desktop_ui_smoke is enabled"
              "- install/uninstall smoke"
              "- setup installer smoke"
              ""
              "SHA-256 checksums are attached as EDetection-win-x64.sha256.txt."
              "SHA-256 verifies file integrity, not publisher identity."
              "Windows checksum command: Get-FileHash .\EDetection-Setup-win-x64.exe -Algorithm SHA256"
          ) | Set-Content -Path $notesPath -Encoding UTF8

          $releaseViewOutput = & gh release view $tag --repo $env:GITHUB_REPOSITORY --json id,tagName 2>&1
          $releaseExitCode = $LASTEXITCODE
          $global:LASTEXITCODE = 0
          if ($releaseExitCode -eq 0) {
              $releaseExists = $true
          }
          elseif (($releaseViewOutput -join "`n") -match '(?i)(not found|could not resolve to a release)') {
              $releaseExists = $false
          }
          else {
              throw "Failed to query release $tag. gh output: $($releaseViewOutput -join ' ')"
          }

          if ($releaseExists) {
              throw "Release $tag already exists. Published release assets are immutable for desktop updates; create a new patch tag instead."
          }
          else {
              gh release create $tag $setupPath.FullName $zipPath.FullName $shaPath --repo $env:GITHUB_REPOSITORY --verify-tag --title "E-Detection $tag" --notes-file $notesPath
              if ($LASTEXITCODE -ne 0) {
                  throw "Failed to create release $tag."
              }
          }
